[output]
# Output file name prefix (timestamp will be added automatically)
output_prefix = cloud_assets
# Output directory (relative to script location or absolute path)
output_dir = ./output
# Include timestamp in filename (format: YYYYMMDD_HHMM)
include_timestamp = true

[display]
# Show progress during scan
show_progress = true
# Verbose output (detailed logging)
verbose = false
# Sort resource types by count (descending)
sort_by_count = true
# Minimum count to display (0 = show all)
min_count_display = 0

[performance]
# Enable parallel processing for multiple accounts
parallel_processing = false
# Maximum number of parallel workers
max_workers = 5
# API request timeout in seconds
request_timeout = 30
# Maximum retries for failed API calls
max_retries = 3







